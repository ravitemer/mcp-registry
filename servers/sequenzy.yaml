id: sequenzy
name: Sequenzy
description: >-
  Official MCP server for Sequenzy email marketing automation: manage
  subscribers, lists, segments, templates, campaigns, sequences, transactional
  email, analytics, and AI-generated email content.
author: Sequenzy
url: https://github.com/Sequenzy/mcp
license: MIT
category: marketing
tags:
  - email-marketing
  - marketing-automation
  - campaigns
  - subscribers
  - transactional-email
  - remote-mcp
installations:
  - name: Remote
    description: Connect to Sequenzy's hosted Streamable HTTP MCP endpoint.
    config: |-
      {
        "url": "https://api.sequenzy.com/v1/mcp",
        "headers": {
          "Authorization": "Bearer ${SEQUENZY_API_KEY}"
        }
      }
    prerequisites:
      - Sequenzy account
      - Sequenzy API key
    parameters:
      - name: Sequenzy API Key
        key: SEQUENZY_API_KEY
        description: API key from the Sequenzy dashboard.
        placeholder: seq_user_your_key_here
        required: true
    transports:
      - streamable-http
  - name: NPX
    description: Run the local stdio MCP server with npx.
    config: |-
      {
        "command": "npx",
        "args": ["-y", "@sequenzy/mcp"],
        "env": {
          "SEQUENZY_API_KEY": "${SEQUENZY_API_KEY}"
        }
      }
    prerequisites:
      - Node.js
      - Sequenzy account
      - Sequenzy API key
    parameters:
      - name: Sequenzy API Key
        key: SEQUENZY_API_KEY
        description: API key from the Sequenzy dashboard.
        placeholder: seq_user_your_key_here
        required: true
    transports:
      - stdio
featured: false
verified: false
